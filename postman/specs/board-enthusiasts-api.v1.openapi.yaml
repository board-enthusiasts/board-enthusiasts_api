openapi: 3.1.0
info:
  title: Board Enthusiasts API
  version: 1.0.0-wave-2
  description: >
    Maintained Wave 2 API surface served by Cloudflare Workers with Supabase Auth,
    Postgres, and Storage.
servers:
  - url: http://127.0.0.1:8787
    description: Local Workers runtime
  - url: https://api.staging.boardenthusiasts.com
    description: Staging Workers runtime
tags:
  - name: Health
    description: API metadata and dependency health probes.
  - name: Catalog
    description: Public catalog and studio browsing routes.
  - name: Identity
    description: Current-user bootstrap and profile routes.
  - name: Developer
    description: Developer enrollment and managed studio routes.
  - name: Moderation
    description: Moderator search and review routes.
paths:
  /:
    get:
      tags: [Health]
      security: []
      summary: Get API metadata
      operationId: getApiMetadata
      responses:
        "200":
          description: API metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMetadata"
  /health/live:
    get:
      tags: [Health]
      security: []
      summary: Liveness health probe
      operationId: getLiveness
      responses:
        "200":
          description: Worker process is live.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /health/ready:
    get:
      tags: [Health]
      security: []
      summary: Readiness health probe
      operationId: getReadiness
      responses:
        "200":
          description: Worker dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Supabase dependencies are unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /catalog:
    get:
      tags: [Catalog]
      security: []
      summary: List public catalog titles
      operationId: listCatalogTitles
      parameters:
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: studioSlug
          in: query
          required: false
          schema:
            type: string
        - name: contentKind
          in: query
          required: false
          schema:
            type: string
            enum: [game, app]
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [title, genre]
      responses:
        "200":
          description: Public catalog titles returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogTitleListResponse"
  /catalog/{studioSlug}/{titleSlug}:
    get:
      tags: [Catalog]
      security: []
      summary: Get public catalog title detail
      operationId: getCatalogTitle
      parameters:
        - $ref: "#/components/parameters/StudioSlug"
        - $ref: "#/components/parameters/TitleSlug"
      responses:
        "200":
          description: Public catalog title detail returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogTitleResponse"
        "404":
          description: Catalog title was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /studios:
    get:
      tags: [Catalog]
      security: []
      summary: List public studios
      operationId: listStudios
      responses:
        "200":
          description: Public studios returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioListResponse"
  /studios/{studioSlug}:
    get:
      tags: [Catalog]
      security: []
      summary: Get public studio detail
      operationId: getStudio
      parameters:
        - $ref: "#/components/parameters/StudioSlug"
      responses:
        "200":
          description: Public studio detail returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioResponse"
        "404":
          description: Studio was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me:
    get:
      tags: [Identity]
      summary: Get the current user bootstrap payload
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me/profile:
    get:
      tags: [Identity]
      summary: Get the current user profile
      operationId: getCurrentUserProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    put:
      tags: [Identity]
      summary: Update the current user profile
      operationId: updateCurrentUserProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileRequest"
      responses:
        "200":
          description: Current user profile updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          description: Profile update request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationProblem"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /identity/me/developer-enrollment:
    get:
      tags: [Identity]
      summary: Get developer enrollment state for the current user
      operationId: getDeveloperEnrollment
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Developer enrollment read model returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperEnrollmentResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      tags: [Identity]
      summary: Enroll the current user as a developer
      operationId: enrollCurrentUserAsDeveloper
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Developer enrollment was applied successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperEnrollmentResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /developer/studios:
    get:
      tags: [Developer]
      summary: List studios managed by the current developer
      operationId: listManagedStudios
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Managed studios returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have developer access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /moderation/developers:
    get:
      tags: [Moderation]
      summary: Search developers for moderation workflows
      operationId: searchModerationDevelopers
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Moderation developer search results returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationDeveloperListResponse"
        "401":
          description: Bearer token was missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Current user does not have moderation access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token for the authenticated user session.
  parameters:
    PageNumber:
      name: pageNumber
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    StudioSlug:
      name: studioSlug
      in: path
      required: true
      schema:
        type: string
    TitleSlug:
      name: titleSlug
      in: path
      required: true
      schema:
        type: string
  schemas:
    ApiMetadata:
      type: object
      required: [service, phase, environment]
      properties:
        service:
          type: string
        phase:
          type: string
        environment:
          type: string
    LivenessResponse:
      type: object
      required: [status, environment]
      properties:
        status:
          type: string
        environment:
          type: string
    ReadinessResponse:
      type: object
      required: [status, environment, wave, phaseStatus, supabaseUrlConfigured, mediaBucket]
      properties:
        status:
          type: string
        environment:
          type: string
        wave:
          type: string
        phaseStatus:
          type: string
        supabaseUrlConfigured:
          type: boolean
        mediaBucket:
          type: string
    Problem:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
    ValidationProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    CurrentUserResponse:
      type: object
      required: [subject, displayName, emailVerified, roles]
      properties:
        subject:
          type: string
        displayName:
          type: string
        email:
          type: [string, "null"]
        emailVerified:
          type: boolean
        identityProvider:
          type: [string, "null"]
        roles:
          type: array
          items:
            type: string
    UserProfile:
      type: object
      required: [subject, userName, emailVerified, initials, updatedAt]
      properties:
        subject:
          type: string
        displayName:
          type: [string, "null"]
        userName:
          type: string
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        email:
          type: [string, "null"]
        emailVerified:
          type: boolean
        avatarUrl:
          type: [string, "null"]
        avatarDataUrl:
          type: [string, "null"]
        initials:
          type: string
        updatedAt:
          type: string
          format: date-time
    UserProfileResponse:
      type: object
      required: [profile]
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
    UpdateUserProfileRequest:
      type: object
      properties:
        displayName:
          type: [string, "null"]
    DeveloperEnrollment:
      type: object
      required: [status, actionRequiredBy, developerAccessEnabled, verifiedDeveloper, canSubmitRequest]
      properties:
        status:
          type: string
        actionRequiredBy:
          type: string
        developerAccessEnabled:
          type: boolean
        verifiedDeveloper:
          type: boolean
        canSubmitRequest:
          type: boolean
    DeveloperEnrollmentResponse:
      type: object
      required: [developerEnrollment]
      properties:
        developerEnrollment:
          $ref: "#/components/schemas/DeveloperEnrollment"
    StudioLink:
      type: object
      required: [id, label, url, createdAt, updatedAt]
      properties:
        id:
          type: string
        label:
          type: string
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Studio:
      type: object
      required: [id, slug, displayName, createdAt, updatedAt, links]
      properties:
        id:
          type: string
        slug:
          type: string
        displayName:
          type: string
        description:
          type: [string, "null"]
        logoUrl:
          type: [string, "null"]
        bannerUrl:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        links:
          type: array
          items:
            $ref: "#/components/schemas/StudioLink"
    StudioListResponse:
      type: object
      required: [studios]
      properties:
        studios:
          type: array
          items:
            $ref: "#/components/schemas/Studio"
    StudioResponse:
      type: object
      required: [studio]
      properties:
        studio:
          $ref: "#/components/schemas/Studio"
    CatalogTitleSummary:
      type: object
      required:
        - id
        - studioId
        - studioSlug
        - slug
        - contentKind
        - lifecycleStatus
        - visibility
        - isReported
        - currentMetadataRevision
        - displayName
        - shortDescription
        - genreDisplay
        - minPlayers
        - maxPlayers
        - playerCountDisplay
        - ageRatingAuthority
        - ageRatingValue
        - minAgeYears
        - ageDisplay
      properties:
        id:
          type: string
        studioId:
          type: string
        studioSlug:
          type: string
        slug:
          type: string
        contentKind:
          type: string
        lifecycleStatus:
          type: string
        visibility:
          type: string
        isReported:
          type: boolean
        currentMetadataRevision:
          type: integer
        displayName:
          type: string
        shortDescription:
          type: string
        genreDisplay:
          type: string
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
        playerCountDisplay:
          type: string
        ageRatingAuthority:
          type: string
        ageRatingValue:
          type: string
        minAgeYears:
          type: integer
        ageDisplay:
          type: string
        cardImageUrl:
          type: [string, "null"]
        acquisitionUrl:
          type: [string, "null"]
    Paging:
      type: object
      required: [pageNumber, pageSize, totalCount, totalPages]
      properties:
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
    CatalogTitleListResponse:
      type: object
      required: [titles, paging]
      properties:
        titles:
          type: array
          items:
            $ref: "#/components/schemas/CatalogTitleSummary"
        paging:
          $ref: "#/components/schemas/Paging"
    CatalogTitleResponse:
      type: object
      required: [title]
      properties:
        title:
          $ref: "#/components/schemas/CatalogTitleSummary"
    ModerationDeveloperSummary:
      type: object
      required: [developerSubject, userName, displayName, developerAccessEnabled, verifiedDeveloper, roles]
      properties:
        developerSubject:
          type: string
        userName:
          type: string
        displayName:
          type: string
        email:
          type: [string, "null"]
        developerAccessEnabled:
          type: boolean
        verifiedDeveloper:
          type: boolean
        roles:
          type: array
          items:
            type: string
    ModerationDeveloperListResponse:
      type: object
      required: [developers]
      properties:
        developers:
          type: array
          items:
            $ref: "#/components/schemas/ModerationDeveloperSummary"
